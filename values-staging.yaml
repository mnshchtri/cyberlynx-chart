# Staging overrides

gateway:
  enabled: false # Staging shares the Gateway managed by the prod release
  crossNamespaceRoutes:
    enabled: false # ArgoCD/Grafana cross-ns routes are prod-only
replicaCount: 2 # Increased for staging to better simulate production load

# --- Backend Configuration ---
backend:
  replicaCount: 2
  image:
    tag: latest

# --- Frontend Configuration ---
frontend:
  image:
    tag: latest

hostnames:
  # Updated hostnames for Staging environment
  app: "app-staging.cyberlynx.citytech"
  grafana: "grafana-staging.cyberlynx.citytech"
  # argocd route is prod-only (http://argocd.cyberlynx.citytech/)

