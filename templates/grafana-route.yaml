{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "cyberlynx.fullname" . }}-grafana-route
  labels:
    {{- include "cyberlynx.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name | default "cyberlynx-gateway" }}
  hostnames:
  - {{ .Values.hostnames.grafana | quote }}
  rules:
  - backendRefs:
    - name: prometheus-grafana
      port: 80
      kind: Service
{{- end }}