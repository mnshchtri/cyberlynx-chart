{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "cyberlynx.fullname" . }}-argocd-route
  labels:
    {{- include "cyberlynx.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ include "cyberlynx.fullname" . }}-gateway
  hostnames:
  - {{ .Values.hostnames.argocd | quote }}
  rules:
  - backendRefs:
    - name: argocd-server
      namespace: argocd
      port: 80
{{- end }}
