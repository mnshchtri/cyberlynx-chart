# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.fullnameOverride | default (printf "%s-backend" (include "cyberlynx.fullname" .)) }}
  labels:
    {{- include "cyberlynx.labels" . | nindent 4 }}
    app: backend
spec:
  replicas: {{ .Values.backend.replicaCount | default .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cyberlynx.selectorLabels" . | nindent 6 }}
      app: backend
  template:
    metadata:
      labels:
        {{- include "cyberlynx.selectorLabels" . | nindent 8 }}
        app: backend
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        args: ["backend"]
        ports:
        - containerPort: {{ .Values.backend.port }}
        envFrom:
        - secretRef:
            name: {{ include "cyberlynx.fullname" . }}-secrets
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.fullnameOverride | default (printf "%s-backend" (include "cyberlynx.fullname" .)) }}
  labels:
    {{- include "cyberlynx.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "cyberlynx.selectorLabels" . | nindent 4 }}
    app: backend
  ports:
    - protocol: TCP
      port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontend.fullnameOverride | default (printf "%s-frontend" (include "cyberlynx.fullname" .)) }}
  labels:
    {{- include "cyberlynx.labels" . | nindent 4 }}
    app: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cyberlynx.selectorLabels" . | nindent 6 }}
      app: frontend
  template:
    metadata:
      labels:
        {{- include "cyberlynx.selectorLabels" . | nindent 8 }}
        app: frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        command: ["/bin/sh", "-c"]
        args: ["sleep 5 && ./entrypoint.sh frontend"]
        ports:
        - containerPort: {{ .Values.frontend.port }}
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontend.fullnameOverride | default (printf "%s-frontend" (include "cyberlynx.fullname" .)) }}
  labels:
    {{- include "cyberlynx.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "cyberlynx.selectorLabels" . | nindent 4 }}
    app: frontend
  ports:
    - protocol: TCP
      port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
---
# HTTP Route
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "cyberlynx.fullname" . }}-route
  labels:
    {{- include "cyberlynx.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name | default "cyberlynx-gateway" }}
  hostnames:
  - {{ .Values.hostnames.app | quote }}
  rules:
  - matches:
    - path: { type: PathPrefix, value: /api }
    backendRefs:
    - name: {{ .Values.backend.fullnameOverride | default (printf "%s-backend" (include "cyberlynx.fullname" .)) }}
      port: {{ .Values.backend.port }}
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: {{ .Values.frontend.fullnameOverride | default (printf "%s-frontend" (include "cyberlynx.fullname" .)) }}
      port: {{ .Values.frontend.port }}
