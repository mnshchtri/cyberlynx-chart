# Default values for cyberlynx
replicaCount: 1

backend:
  fullnameOverride: "cyber-lynx-backend"
  image:
    repository: mnshchtri/cyber-lynx
    tag: latest # Jenkins will update this automatically
    pullPolicy: Always
  port: 8080

frontend:
  fullnameOverride: "cyber-lynx-frontend"
  image:
    repository: mnshchtri/cyber-lynx
    tag: latest
    pullPolicy: Always
  port: 80

gateway:
  enabled: true
  name: cyberlynx-gateway
  namespace: default # All env routes attach to this single shared Gateway
  class: nginx
  crossNamespaceRoutes:
    enabled: true # Only prod deploys grafana/argocd routes and ReferenceGrant
    hostnames:
      grafana: "grafana.cyberlynx.citytech"
      argocd: "argocd.cyberlynx.citytech"

# Domains for HTTPRoutes
hostnames:
  app: "app.cyberlynx.citytech"

