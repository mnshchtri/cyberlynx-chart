# Dev environment overrides
# Dev deploys to the 'dev' namespace with its own dedicated Gateway.
# The ArgoCD Application for dev must set destination.namespace: dev

gateway:
  enabled: false # Dev shares the shared Gateway in the 'default' namespace
  class: nginx
  crossNamespaceRoutes:
    enabled: false # Dev ArgoCD project can't manage monitoring/argocd namespaces

hostnames:
  app: "app-dev.cyberlynx.citytech"

backend:
  image:
    tag: "v0.1.0.53"

frontend:
  image:
    tag: "v0.1.0.53"

